<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wireless Network Planner — Vesta IT Services Ltd</title>
<meta name="description" content="Plan your wireless point-to-point network. Upload your site plan, place PTP nodes, auto-connect links, then save as PDF or share with Vesta IT Services."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
  <script src="vesta.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<style>
:root{
  --navy:#1E2163;--navy-dark:#141548;--navy-deeper:#0D0E30;
  --accent:#E8740C;--accent-lt:#F4974A;
  --steel:#4A5568;--mist:#F4F6FB;--white:#fff;
  --border:#DDE2EE;--text:#2D3748;--muted:#64748B;
  --ubiquiti:#0559C9;--cambium:#00A651;--mikrotik:#CC0000;--generic:#7C3AED;
  --fb:'DM Sans',system-ui,sans-serif;
  --fd:'DM Serif Display',Georgia,serif;
  --nh:68px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;scroll-behavior:smooth}
body{font-family:var(--fb);color:var(--text);background:var(--white);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;display:flex;flex-direction:column}
img{display:block;max-width:100%}a{text-decoration:none;color:inherit}ul{list-style:none}button{cursor:pointer;font-family:var(--fb)}

/* NAV */
nav{height:var(--nh);background:rgba(255,255,255,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);flex-shrink:0;transition:box-shadow .3s}
nav.scrolled{box-shadow:0 2px 20px rgba(0,0,0,.07)}
.nav-i{max-width:1400px;margin:0 auto;padding:0 1.5rem;height:100%;display:flex;align-items:center;gap:1.5rem}
.nav-logo img{height:40px;width:auto;max-width:160px;object-fit:contain}

.nav-cta:hover{background:var(--accent);transform:translateY(-1px)}

/* HERO BAR */
.hero-bar{background:var(--navy-deeper);padding:1.25rem 0;flex-shrink:0;position:relative;overflow:hidden}
.hero-bar-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(232,116,12,.12) 0%,transparent 55%)}
.hero-bar-c{position:relative;z-index:2;max-width:1400px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.hero-bar-text{}
.sec-lbl{font-size:.68rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.sec-lbl::before{content:'';width:14px;height:1.5px;background:var(--accent);display:inline-block}
.hero-bar h1{font-family:var(--fd);font-size:1.4rem;color:#fff;line-height:1.1;margin-bottom:.25rem}
.hero-bar-sub{font-size:.82rem;color:rgba(255,255,255,.45);max-width:50ch}
.hero-bar-steps{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.step-pill{display:flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:500;color:rgba(255,255,255,.5)}
.step-n{width:18px;height:18px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.6rem;
